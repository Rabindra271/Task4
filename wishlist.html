<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist | Grocery Market</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div>
        <a class="brand" href="index.html">Grocery Market</a>
        <p class="subtitle">Saved items you can buy later.</p>
      </div>
      <div class="header-actions">
        <a class="nav-link" href="index.html">Back to Shop</a>
        <button id="themeToggle" class="icon-button" aria-label="Toggle dark mode">🌙</button>
      </div>
    </header>

    <main class="wishlist-page">
      <section class="wishlist-hero">
        <h1>Your Wishlist</h1>
        <p>Keep track of grocery favorites and move items into your cart when ready.</p>
      </section>

      <section class="wishlist-actions">
        <button id="clearWishlist" class="button button-secondary">Clear Wishlist</button>
      </section>

      <section id="wishlistGrid" class="wishlist-grid"></section>
    </main>

    <footer class="page-footer"><p>Wishlist page for saved grocery items.</p></footer>
  </div>

  <script src="data.js"></script>
  <script src="wishlist.js"></script>
</body>
</html>
